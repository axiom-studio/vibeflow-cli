name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# The axiom-studio org Actions policy only allows actions from org-owned
# repositories, so this workflow uses no `uses:` steps. Checkout, Go
# toolchain setup, and GoReleaser all run as plain shell commands.

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -q .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --prune --tags origin "$GITHUB_SHA"
          git checkout -q --detach FETCH_HEAD

      - name: Set up Go
        run: |
          GO_VERSION="$(awk '$1 == "go" {print $2}' go.mod)"
          curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tgz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          /usr/local/go/bin/go version

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@latest

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean
