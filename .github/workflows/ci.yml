name: CI

on:
  pull_request:
    branches: [main]

# Read-only: CI only tests pull requests. Builds happen only on tags — the
# GoReleaser build + publish (which needs contents: write) lives in
# release.yml and runs on tag pushes only.
permissions:
  contents: read

# The axiom-studio org Actions policy only allows actions from org-owned
# repositories, so these workflows use no `uses:` steps. Checkout, Go
# toolchain setup, and GoReleaser all run as plain shell commands.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -q .
          # Auth via a transient http.extraHeader passed per-command — never
          # written to .git/config, so the token is not left on the runner FS
          # for later steps to read.
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c http.extraHeader="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')" \
            fetch -q --depth 1 origin "$GITHUB_SHA"
          git checkout -q --detach FETCH_HEAD

      - name: Set up Go
        run: |
          GO_VERSION="$(awk '$1 == "go" {print $2}' go.mod)"
          GO_TARBALL="go${GO_VERSION}.linux-amd64.tar.gz"
          # Verify the toolchain tarball against the SHA256 go.dev publishes in
          # its download manifest before extracting. The toolchain compiles the
          # release binaries, so a tampered tarball would backdoor every
          # artifact. Fetching the hash (vs. hardcoding) keeps the check working
          # when go.mod bumps the Go version. Fails closed on mismatch.
          GO_SHA256="$(curl -fsSL 'https://go.dev/dl/?mode=json&include=all' \
            | jq -r --arg f "$GO_TARBALL" '.[].files[] | select(.filename == $f) | .sha256')"
          if [ -z "$GO_SHA256" ]; then
            echo "::error::no published SHA256 for ${GO_TARBALL} in go.dev manifest" >&2
            exit 1
          fi
          curl -fsSL "https://go.dev/dl/${GO_TARBALL}" -o /tmp/go.tgz
          echo "${GO_SHA256}  /tmp/go.tgz" | sha256sum -c -
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          /usr/local/go/bin/go version

      - name: Gofmt
        run: |
          # Fail if any Go source file is not gofmt-clean. `go vet` does not
          # catch formatting, so without this gate unformatted code passes CI
          # (issue #3163). Scoped to the source roots (matches the fix command
          # below and avoids scanning untracked local dirs). Action-free shell
          # per the org Actions policy (see header comment / #2716).
          unformatted="$(gofmt -l cmd internal sessionid)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files (run: gofmt -w cmd internal sessionid):" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
